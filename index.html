<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>사회 시험 대비 학습 자료</title>
  <meta name="description" content="사회 과목 시험 대비 플래시카드, 4지선다, 단답형 퀴즈 종합 학습 자료">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0e1a;
      --bg-secondary: #111827;
      --bg-card: #1a2035;
      --bg-card-hover: #1f2847;
      --surface: #252d44;
      --border: rgba(255,255,255,0.06);
      --border-glow: rgba(99,102,241,0.3);
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --accent-1: #818cf8;
      --accent-2: #6366f1;
      --accent-3: #4f46e5;
      --green: #34d399;
      --green-bg: rgba(52,211,153,0.1);
      --red: #f87171;
      --red-bg: rgba(248,113,113,0.1);
      --yellow: #fbbf24;
      --yellow-bg: rgba(251,191,36,0.1);
      --blue: #60a5fa;
      --blue-bg: rgba(96,165,250,0.1);
      --purple: #a78bfa;
      --purple-bg: rgba(167,139,250,0.1);
      --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --gradient-2: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      --gradient-3: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      --gradient-4: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
      --glass: rgba(255,255,255,0.03);
      --glass-border: rgba(255,255,255,0.08);
      --shadow-lg: 0 25px 50px -12px rgba(0,0,0,0.5);
      --shadow-glow: 0 0 40px rgba(99,102,241,0.15);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ===== Animated Background ===== */
    .bg-orbs {
      position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
    }
    .bg-orbs .orb {
      position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.15;
      animation: float 20s ease-in-out infinite;
    }
    .bg-orbs .orb:nth-child(1) {
      width: 600px; height: 600px; background: #6366f1; top: -10%; left: -5%;
      animation-duration: 25s;
    }
    .bg-orbs .orb:nth-child(2) {
      width: 500px; height: 500px; background: #8b5cf6; bottom: -10%; right: -5%;
      animation-duration: 30s; animation-delay: -5s;
    }
    .bg-orbs .orb:nth-child(3) {
      width: 400px; height: 400px; background: #06b6d4; top: 50%; left: 50%;
      animation-duration: 22s; animation-delay: -10s;
    }
    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -50px) scale(1.05); }
      66% { transform: translate(-20px, 20px) scale(0.95); }
    }

    /* ===== Container ===== */
    .container {
      position: relative; z-index: 1;
      max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem 4rem;
    }

    /* ===== Header ===== */
    .header {
      text-align: center; padding: 3rem 0 2rem;
      animation: fadeInDown 0.8s ease-out;
    }
    .header h1 {
      font-size: 2.8rem; font-weight: 900;
      background: linear-gradient(135deg, #818cf8 0%, #c084fc 50%, #f472b6 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; letter-spacing: -1px; margin-bottom: 0.5rem;
    }
    .header p {
      font-size: 1.1rem; color: var(--text-secondary); font-weight: 300;
    }

    /* ===== Tab Navigation ===== */
    .tab-nav {
      display: flex; gap: 0.5rem; justify-content: center; margin: 2rem 0;
      flex-wrap: wrap; animation: fadeInUp 0.6s ease-out 0.2s both;
    }
    .tab-btn {
      padding: 0.7rem 1.5rem; border: 1px solid var(--glass-border);
      background: var(--glass); color: var(--text-secondary);
      border-radius: 100px; cursor: pointer; font-size: 0.95rem;
      font-family: 'Noto Sans KR', sans-serif; font-weight: 500;
      transition: all 0.3s ease; backdrop-filter: blur(10px);
    }
    .tab-btn:hover {
      background: rgba(99,102,241,0.1); color: var(--accent-1);
      border-color: var(--border-glow); transform: translateY(-2px);
    }
    .tab-btn.active {
      background: var(--gradient-1); color: white;
      border-color: transparent; box-shadow: 0 4px 15px rgba(99,102,241,0.4);
    }

    /* ===== Sections ===== */
    .section { display: none; animation: fadeIn 0.5s ease-out; }
    .section.active { display: block; }

    /* ===== Unit Selector ===== */
    .unit-selector {
      display: flex; gap: 0.5rem; justify-content: center;
      margin-bottom: 2rem; flex-wrap: wrap;
    }
    .unit-btn {
      padding: 0.5rem 1.2rem; border-radius: 12px; cursor: pointer;
      font-size: 0.85rem; font-weight: 600; font-family: 'Noto Sans KR', sans-serif;
      border: 1px solid var(--glass-border); background: var(--glass);
      color: var(--text-secondary); transition: all 0.3s;
    }
    .unit-btn:hover { transform: translateY(-2px); }
    .unit-btn.active { color: white; border-color: transparent; }
    .unit-btn[data-unit="1"].active { background: var(--gradient-1); }
    .unit-btn[data-unit="2"].active { background: var(--gradient-2); }
    .unit-btn[data-unit="3"].active { background: var(--gradient-3); }
    .unit-btn[data-unit="4"].active { background: var(--gradient-4); }

    /* ===== Flashcard ===== */
    .flashcard-area {
      perspective: 1200px; margin: 0 auto;
      max-width: 600px; min-height: 320px;
    }
    .flashcard-wrapper {
      position: relative; width: 100%; min-height: 320px;
      cursor: pointer; transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
      transform-style: preserve-3d;
    }
    .flashcard-wrapper.flipped { transform: rotateY(180deg); }
    .flashcard-front, .flashcard-back {
      position: absolute; inset: 0; border-radius: 24px; padding: 2.5rem;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      backface-visibility: hidden; -webkit-backface-visibility: hidden;
      border: 1px solid var(--glass-border);
      box-shadow: var(--shadow-lg);
    }
    .flashcard-front {
      background: linear-gradient(145deg, var(--bg-card), var(--surface));
    }
    .flashcard-back {
      background: linear-gradient(145deg, #1a1f3a, #252d55);
      transform: rotateY(180deg);
    }
    .flashcard-label {
      font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px;
      color: var(--accent-1); margin-bottom: 1rem; font-weight: 700;
    }
    .flashcard-content {
      font-size: 1.2rem; text-align: center; line-height: 1.8;
      font-weight: 500; word-break: keep-all;
    }
    .flashcard-back .flashcard-content { color: var(--green); }
    .flashcard-hint {
      position: absolute; bottom: 1.2rem;
      font-size: 0.75rem; color: var(--text-muted);
    }
    .flashcard-counter {
      text-align: center; margin-top: 1.5rem;
      color: var(--text-muted); font-size: 0.9rem;
    }
    .flashcard-nav {
      display: flex; gap: 1rem; justify-content: center; margin-top: 1.2rem;
    }
    .nav-btn {
      padding: 0.7rem 2rem; border-radius: 14px; cursor: pointer;
      font-size: 0.9rem; font-weight: 600; font-family: 'Noto Sans KR', sans-serif;
      border: 1px solid var(--glass-border); background: var(--glass);
      color: var(--text-secondary); transition: all 0.3s;
    }
    .nav-btn:hover {
      background: rgba(99,102,241,0.15); color: var(--accent-1);
      transform: translateY(-2px);
    }

    /* ===== Quiz ===== */
    .quiz-card {
      background: linear-gradient(145deg, var(--bg-card), var(--surface));
      border: 1px solid var(--glass-border); border-radius: 24px;
      padding: 2rem; margin-bottom: 1.5rem;
      transition: all 0.3s; animation: fadeInUp 0.5s ease-out both;
    }
    .quiz-card:hover { border-color: var(--border-glow); }
    .quiz-number {
      display: inline-flex; align-items: center; justify-content: center;
      width: 36px; height: 36px; border-radius: 10px; font-size: 0.85rem;
      font-weight: 700; margin-bottom: 1rem;
    }
    .quiz-card[data-unit="1"] .quiz-number { background: rgba(129,140,248,0.15); color: var(--accent-1); }
    .quiz-card[data-unit="2"] .quiz-number { background: rgba(248,113,113,0.15); color: var(--red); }
    .quiz-card[data-unit="3"] .quiz-number { background: rgba(96,165,250,0.15); color: var(--blue); }
    .quiz-card[data-unit="4"] .quiz-number { background: rgba(52,211,153,0.15); color: var(--green); }
    .quiz-question {
      font-size: 1.05rem; font-weight: 600; line-height: 1.7;
      margin-bottom: 1.2rem; word-break: keep-all;
    }
    .quiz-options { display: flex; flex-direction: column; gap: 0.6rem; }
    .quiz-option {
      padding: 0.85rem 1.2rem; border-radius: 14px;
      border: 1px solid var(--glass-border); background: var(--glass);
      cursor: pointer; font-size: 0.95rem; font-weight: 400;
      font-family: 'Noto Sans KR', sans-serif; color: var(--text-secondary);
      transition: all 0.25s; text-align: left; line-height: 1.5;
    }
    .quiz-option:hover:not(.selected):not(.disabled) {
      background: rgba(99,102,241,0.08); border-color: var(--border-glow);
      color: var(--text-primary); transform: translateX(4px);
    }
    .quiz-option.correct {
      background: var(--green-bg); border-color: var(--green);
      color: var(--green); font-weight: 600;
    }
    .quiz-option.wrong {
      background: var(--red-bg); border-color: var(--red);
      color: var(--red); font-weight: 600;
    }
    .quiz-option.disabled { cursor: default; opacity: 0.6; }
    .quiz-explanation {
      margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 14px;
      background: rgba(99,102,241,0.06); border: 1px solid rgba(99,102,241,0.15);
      font-size: 0.9rem; line-height: 1.6; color: var(--text-secondary);
      display: none; animation: fadeIn 0.3s ease-out;
    }
    .quiz-explanation.show { display: block; }

    /* ===== Short Answer Quiz ===== */
    .short-card {
      background: linear-gradient(145deg, var(--bg-card), var(--surface));
      border: 1px solid var(--glass-border); border-radius: 24px;
      padding: 2rem; margin-bottom: 1.5rem;
      transition: all 0.3s; animation: fadeInUp 0.5s ease-out both;
    }
    .short-card:hover { border-color: var(--border-glow); }
    .short-input-group {
      display: flex; gap: 0.7rem; margin-top: 1rem; flex-wrap: wrap;
    }
    .short-input {
      flex: 1; min-width: 180px; padding: 0.8rem 1.2rem; border-radius: 14px;
      border: 1px solid var(--glass-border); background: var(--glass);
      color: var(--text-primary); font-size: 0.95rem;
      font-family: 'Noto Sans KR', sans-serif;
      transition: all 0.3s; outline: none;
    }
    .short-input:focus {
      border-color: var(--accent-1);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
    }
    .short-input.correct { border-color: var(--green); background: var(--green-bg); }
    .short-input.wrong { border-color: var(--red); background: var(--red-bg); }
    .check-btn {
      padding: 0.8rem 1.5rem; border-radius: 14px; cursor: pointer;
      font-size: 0.9rem; font-weight: 600; font-family: 'Noto Sans KR', sans-serif;
      border: none; background: var(--gradient-1); color: white;
      transition: all 0.3s; white-space: nowrap;
    }
    .check-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(99,102,241,0.4); }
    .short-answer {
      margin-top: 0.8rem; padding: 0.8rem 1.2rem; border-radius: 14px;
      font-size: 0.9rem; line-height: 1.6; display: none;
    }
    .short-answer.show { display: block; animation: fadeIn 0.3s ease-out; }
    .short-answer.correct-answer { background: var(--green-bg); color: var(--green); }
    .short-answer.wrong-answer { background: var(--red-bg); color: var(--red); }

    /* ===== Score Board ===== */
    .score-board {
      text-align: center; padding: 2rem; margin-bottom: 2rem;
      background: linear-gradient(145deg, var(--bg-card), var(--surface));
      border: 1px solid var(--glass-border); border-radius: 24px;
    }
    .score-big {
      font-size: 3.5rem; font-weight: 900;
      background: linear-gradient(135deg, var(--green), var(--blue));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .score-label { color: var(--text-muted); font-size: 0.9rem; margin-top: 0.3rem; }
    .reset-btn {
      margin-top: 1.2rem; padding: 0.7rem 2rem; border-radius: 14px;
      border: 1px solid var(--glass-border); background: var(--glass);
      color: var(--text-secondary); cursor: pointer; font-size: 0.9rem;
      font-weight: 600; font-family: 'Noto Sans KR', sans-serif; transition: all 0.3s;
    }
    .reset-btn:hover { background: rgba(248,113,113,0.1); color: var(--red); border-color: var(--red); }

    /* ===== Animations ===== */
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

    /* ===== Responsive ===== */
    @media (max-width: 640px) {
      .header h1 { font-size: 2rem; }
      .container { padding: 1rem 1rem 3rem; }
      .flashcard-front, .flashcard-back { padding: 1.5rem; }
      .flashcard-content { font-size: 1rem; }
      .tab-btn { padding: 0.5rem 1rem; font-size: 0.85rem; }
      .quiz-card, .short-card { padding: 1.5rem; }
    }

    /* ===== Progress Bar ===== */
    .progress-bar-wrap {
      width: 100%; height: 6px; background: var(--surface);
      border-radius: 100px; margin-top: 1rem; overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%; border-radius: 100px; transition: width 0.5s ease;
      background: var(--gradient-1);
    }

    /* ===== Confetti effect for perfect score ===== */
    .confetti-container {
      position: fixed; inset: 0; pointer-events: none; z-index: 999;
    }
    .confetti {
      position: absolute; width: 10px; height: 10px; opacity: 0;
    }
  </style>
</head>
<body>

<div class="bg-orbs">
  <div class="orb"></div>
  <div class="orb"></div>
  <div class="orb"></div>
</div>

<div class="container">
  <header class="header">
    <h1>📚 사회 시험 대비</h1>
    <p>플래시카드 · 4지선다 · 단답형 퀴즈</p>
  </header>

  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="flashcard">🃏 플래시카드</button>
    <button class="tab-btn" data-tab="quiz">📋 4지선다</button>
    <button class="tab-btn" data-tab="short">✏️ 단답형</button>
  </nav>

  <!-- ==================== FLASHCARD SECTION ==================== -->
  <section id="sec-flashcard" class="section active">
    <div class="unit-selector" id="fc-units"></div>
    <div class="flashcard-area" id="fc-area">
      <div class="flashcard-wrapper" id="fc-wrapper" onclick="flipCard()">
        <div class="flashcard-front">
          <div class="flashcard-label">질문</div>
          <div class="flashcard-content" id="fc-front-text"></div>
          <div class="flashcard-hint">클릭하여 뒤집기</div>
        </div>
        <div class="flashcard-back">
          <div class="flashcard-label">정답</div>
          <div class="flashcard-content" id="fc-back-text"></div>
          <div class="flashcard-hint">클릭하여 돌아가기</div>
        </div>
      </div>
    </div>
    <div class="flashcard-counter" id="fc-counter"></div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="fc-progress"></div></div>
    <div class="flashcard-nav">
      <button class="nav-btn" onclick="fcPrev()">← 이전</button>
      <button class="nav-btn" onclick="fcShuffle()">🔀 섞기</button>
      <button class="nav-btn" onclick="fcNext()">다음 →</button>
    </div>
  </section>

  <!-- ==================== MULTIPLE CHOICE SECTION ==================== -->
  <section id="sec-quiz" class="section">
    <div class="unit-selector" id="qz-units"></div>
    <div class="score-board" id="qz-score-board">
      <div class="score-big" id="qz-score">0 / 0</div>
      <div class="score-label">정답률</div>
      <button class="reset-btn" onclick="resetQuiz()">🔄 다시 풀기</button>
    </div>
    <div id="qz-list"></div>
  </section>

  <!-- ==================== SHORT ANSWER SECTION ==================== -->
  <section id="sec-short" class="section">
    <div class="unit-selector" id="sa-units"></div>
    <div class="score-board" id="sa-score-board">
      <div class="score-big" id="sa-score">0 / 0</div>
      <div class="score-label">정답률</div>
      <button class="reset-btn" onclick="resetShort()">🔄 다시 풀기</button>
    </div>
    <div id="sa-list"></div>
  </section>
</div>

<script>
// ===== DATA =====
const flashcards = {
  1: [
    { q: "인권의 특성 4가지는?", a: "① 천부적(불가침) ② 양도 불가 ③ 보편적 ④ 시대·지역 차별 없음" },
    { q: "기본권이란?", a: "헌법에 기록된 인권" },
    { q: "행복추구권의 성격은?", a: "기본권 보장의 기초, 포괄적 권리" },
    { q: "자유권의 성격은?", a: "소극적 권리 — 국가 권력으로부터의 자유" },
    { q: "사회권의 성격은?", a: "적극적 권리 — 국가에 요구 (교육·근로·인간다운 생활)" },
    { q: "참정권의 성격은?", a: "능동적 권리 — 선거권, 공무담임권, 국민투표권" },
    { q: "청구권의 종류 3가지는?", a: "재판 청구권, 국가배상청구권, 청원권" },
    { q: "기본권 제한의 3가지 사유는?", a: "국가안전 보장, 질서유지, 공공복리" },
    { q: "기본권 제한 시 반드시 지켜야 할 원칙은?", a: "법률로써 제한, 본질적 내용 침해 불가" },
    { q: "노동3권은?", a: "단결권, 단체교섭권, 단체행동권" },
    { q: "부당해고 vs 부당노동행위 차이는?", a: "부당해고 = 근로조건 침해 / 부당노동행위 = 노동3권 침해" },
    { q: "노동권 침해 시 구제 방법은?", a: "지방노동위원회 구제 신청 → 행정소송 또는 민사소송" },
  ],
  2: [
    { q: "국회의원 임기와 선출 방법은?", a: "4년, 직접선거 (지역구의원 + 비례대표의원)" },
    { q: "국회의 3대 권한은?", a: "① 입법권 ② 재정권 ③ 일반 국정 권한" },
    { q: "대통령의 임기와 특징은?", a: "5년 단임 (연임 불가), 직접선거" },
    { q: "대통령의 행정부 수반 권한 3가지는?", a: "공무원임면권, 행정부 지휘·감독, 국군통수권" },
    { q: "대통령의 국가원수 권한은?", a: "외교, 헌법기관 구성, 계엄선포권, 긴급명령권, 국민투표부의권" },

const unitNames = ["", "1단원: 인권과 헌법", "2단원: 국가기관", "3단원: 경제생활", "4단원: 시장과 가격"];

// ===== STATE =====
let currentTab = "flashcard";
let currentUnit = 1;
let fcIndex = 0;
let fcFlipped = false;
let qzAnswered = {};
let saAnswered = {};

// ===== TAB SWITCHING =====
document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentTab = btn.dataset.tab;
    document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
    document.getElementById("sec-" + currentTab).classList.add("active");
  });
});

// ===== UNIT SELECTORS =====
function buildUnitBtns(containerId, onChange) {
  const c = document.getElementById(containerId);
  c.innerHTML = "";
  [1,2,3,4].forEach(u => {
    const b = document.createElement("button");
    b.className = "unit-btn" + (u === currentUnit ? " active" : "");
    b.dataset.unit = u;
    b.textContent = unitNames[u];
    b.addEventListener("click", () => {
      c.querySelectorAll(".unit-btn").forEach(x => x.classList.remove("active"));
      b.classList.add("active");
      currentUnit = u;
      onChange(u);
    });
    c.appendChild(b);
  });
}

// ===== FLASHCARD =====
function renderFC() {
  const cards = flashcards[currentUnit];
  if (!cards || cards.length === 0) return;
  if (fcIndex >= cards.length) fcIndex = 0;
  const card = cards[fcIndex];
  document.getElementById("fc-front-text").textContent = card.q;
  document.getElementById("fc-back-text").textContent = card.a;
  document.getElementById("fc-counter").textContent = `${fcIndex + 1} / ${cards.length}`;
  document.getElementById("fc-progress").style.width = `${((fcIndex + 1) / cards.length) * 100}%`;
  // Reset flip
  fcFlipped = false;
  document.getElementById("fc-wrapper").classList.remove("flipped");
}

function flipCard() {
  fcFlipped = !fcFlipped;
  document.getElementById("fc-wrapper").classList.toggle("flipped");
}

function fcNext() {
  const cards = flashcards[currentUnit];
  fcIndex = (fcIndex + 1) % cards.length;
  renderFC();
}

function fcPrev() {
  const cards = flashcards[currentUnit];
  fcIndex = (fcIndex - 1 + cards.length) % cards.length;
  renderFC();
}

function fcShuffle() {
  const cards = flashcards[currentUnit];
  for (let i = cards.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [cards[i], cards[j]] = [cards[j], cards[i]];
  }
  fcIndex = 0;
  renderFC();
}

// ===== QUIZ =====
function renderQuiz(unit) {
  const list = document.getElementById("qz-list");
  list.innerHTML = "";
  const data = quizData[unit] || [];
  qzAnswered = {};
  updateQuizScore(unit);

  data.forEach((item, i) => {
    const card = document.createElement("div");
    card.className = "quiz-card";
    card.dataset.unit = unit;
    card.style.animationDelay = `${i * 0.08}s`;

    let optsHTML = item.opts.map((o, oi) =>
      `<button class="quiz-option" data-q="${i}" data-o="${oi}" onclick="selectQuizOpt(${unit},${i},${oi},this)">
        ${["①","②","③","④"][oi]} ${o}
      </button>`
    ).join("");

    card.innerHTML = `
      <div class="quiz-number">Q${i+1}</div>
      <div class="quiz-question">${item.q}</div>
      <div class="quiz-options">${optsHTML}</div>
      <div class="quiz-explanation" id="qz-exp-${unit}-${i}">💡 ${item.exp}</div>
    `;
    list.appendChild(card);
  });
}

function selectQuizOpt(unit, qi, oi, btn) {
  if (qzAnswered[`${unit}-${qi}`]) return;
  qzAnswered[`${unit}-${qi}`] = true;

  const data = quizData[unit][qi];
  const card = btn.closest(".quiz-card");
  const opts = card.querySelectorAll(".quiz-option");

  opts.forEach((o, idx) => {
    o.classList.add("disabled");
    if (idx === data.ans) o.classList.add("correct");
  });

  if (oi !== data.ans) btn.classList.add("wrong");

  document.getElementById(`qz-exp-${unit}-${qi}`).classList.add("show");
  updateQuizScore(unit);
}

function updateQuizScore(unit) {
  const data = quizData[unit] || [];
  let correct = 0, total = 0;
  data.forEach((item, i) => {
    if (qzAnswered[`${unit}-${i}`]) {
      total++;
      const card = document.querySelectorAll(`#qz-list .quiz-card`)[i];
      if (card) {
        const opts = card.querySelectorAll(".quiz-option");
        if (opts[item.ans] && opts[item.ans].classList.contains("correct")) {
          const wrongExists = Array.from(opts).some(o => o.classList.contains("wrong"));
          if (!wrongExists || opts[item.ans].classList.contains("correct")) {
            // Check if user selected correctly
            const wrongBtn = card.querySelector(".quiz-option.wrong");
            if (!wrongBtn) correct++;
          }
        }
      }
    }
  });
  document.getElementById("qz-score").textContent = `${correct} / ${data.length}`;
}

function resetQuiz() {
  renderQuiz(currentUnit);
}

    let inputsHTML = "";
    for (let j = 0; j < inputCount; j++) {
      inputsHTML += `<input type="text" class="short-input" id="sa-input-${unit}-${i}-${j}" placeholder="답을 입력하세요" onkeydown="if(event.key==='Enter')checkShort(${unit},${i})">`;
    }

    card.innerHTML = `
      <div class="quiz-number" style="background:rgba(${unit===1?'129,140,248':unit===2?'248,113,113':unit===3?'96,165,250':'52,211,153'},0.15);color:${unitColors[unit]}">S${i+1}</div>
      <div class="quiz-question">${item.q}</div>
      <div class="short-input-group">
        ${inputsHTML}
        <button class="check-btn" onclick="checkShort(${unit},${i})">확인</button>
      </div>
      <div class="short-answer" id="sa-ans-${unit}-${i}"></div>
    `;
    list.appendChild(card);
  });
}

function checkShort(unit, qi) {
  if (saAnswered[`${unit}-${qi}`]) return;
  saAnswered[`${unit}-${qi}`] = true;

  const item = shortData[unit][qi];
  let allCorrect = true;

  for (let j = 0; j < item.answers.length; j++) {
    const input = document.getElementById(`sa-input-${unit}-${qi}-${j}`);
    const val = input.value.trim();
    const acceptable = item.answers[j];
    const isCorrect = acceptable.some(a => val === a);

    input.disabled = true;
    if (isCorrect) {
      input.classList.add("correct");
    } else {
      input.classList.add("wrong");
      allCorrect = false;
    }
  }

  const ansDiv = document.getElementById(`sa-ans-${unit}-${qi}`);
  ansDiv.classList.add("show");
  if (allCorrect) {
    ansDiv.className = "short-answer show correct-answer";
    ansDiv.textContent = "✅ 정답!";
  } else {
    ansDiv.className = "short-answer show wrong-answer";
    ansDiv.textContent = "❌ 정답: " + item.answers.map(a => a[0]).join(" / ");
  }

  updateShortScore(unit);
}

function updateShortScore(unit) {
  const data = shortData[unit] || [];
  let correct = 0, total = 0;
  data.forEach((item, i) => {
    if (saAnswered[`${unit}-${i}`]) {
      total++;
      const ansDiv = document.getElementById(`sa-ans-${unit}-${i}`);
      if (ansDiv && ansDiv.classList.contains("correct-answer")) correct++;
    }
  });
  document.getElementById("sa-score").textContent = `${correct} / ${data.length}`;
}

function resetShort() {
  renderShort(currentUnit);
}

// ===== INIT =====
function init() {
  buildUnitBtns("fc-units", u => { fcIndex = 0; renderFC(); });
  buildUnitBtns("qz-units", u => renderQuiz(u));
  buildUnitBtns("sa-units", u => renderShort(u));
  renderFC();
  renderQuiz(1);
  renderShort(1);
}

// Keyboard nav for flashcards
document.addEventListener("keydown", e => {
  if (currentTab !== "flashcard") return;
  if (e.key === "ArrowRight") fcNext();
  else if (e.key === "ArrowLeft") fcPrev();
  else if (e.key === " " || e.key === "Enter") { e.preventDefault(); flipCard(); }
});

init();
</script>
