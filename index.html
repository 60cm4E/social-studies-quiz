<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>사회 시험 대비 학습 자료</title>
  <meta name="description" content="사회 과목 시험 대비 플래시카드, 4지선다, 단답형 퀴즈 종합 학습 자료">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0e1a;
      --bg-card: #1a2035;
      --surface: #252d44;
      --border: rgba(255,255,255,0.06);
      --border-glow: rgba(99,102,241,0.3);
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --accent-1: #818cf8;
      --accent-2: #6366f1;
      --green: #34d399;
      --green-bg: rgba(52,211,153,0.12);
      --red: #f87171;
      --red-bg: rgba(248,113,113,0.12);
      --blue: #60a5fa;
      --purple: #a78bfa;
      --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --gradient-2: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      --gradient-3: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      --gradient-4: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
      --glass: rgba(255,255,255,0.03);
      --glass-border: rgba(255,255,255,0.08);
      --shadow-lg: 0 20px 40px -12px rgba(0,0,0,0.5);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100dvh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== Background ===== */
    .bg-orbs { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    .bg-orbs .orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.12; animation: float 25s ease-in-out infinite; }
    .bg-orbs .orb:nth-child(1) { width: 400px; height: 400px; background: #6366f1; top: -10%; left: -10%; }
    .bg-orbs .orb:nth-child(2) { width: 350px; height: 350px; background: #8b5cf6; bottom: -10%; right: -10%; animation-delay: -8s; }
    @keyframes float {
      0%, 100% { transform: translate(0,0) scale(1); }
      50% { transform: translate(20px,-30px) scale(1.05); }
    }

    /* ===== Layout ===== */
    .app {
      position: relative; z-index: 1;
      max-width: 480px; margin: 0 auto;
      padding: 0 1rem;
      display: flex; flex-direction: column;
      min-height: 100dvh;
    }

    /* ===== Header ===== */
    .header {
      text-align: center; padding: 1.5rem 0 1rem;
      flex-shrink: 0;
    }
    .header h1 {
      font-size: 1.6rem; font-weight: 900;
      background: linear-gradient(135deg, #818cf8, #c084fc, #f472b6);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; letter-spacing: -0.5px;
    }

    /* ===== Tab Nav ===== */
    .tab-nav {
      display: flex; gap: 6px; justify-content: center;
      padding: 0.5rem 0; flex-shrink: 0;
    }
    .tab-btn {
      padding: 0.5rem 1rem; border: 1px solid var(--glass-border);
      background: var(--glass); color: var(--text-muted);
      border-radius: 100px; cursor: pointer; font-size: 0.82rem;
      font-family: inherit; font-weight: 600; transition: all 0.3s;
    }
    .tab-btn.active {
      background: var(--gradient-1); color: white;
      border-color: transparent; box-shadow: 0 4px 12px rgba(99,102,241,0.35);
    }

    /* ===== Unit Pills ===== */
    .unit-pills {
      display: flex; gap: 6px; justify-content: center;
      padding: 0.6rem 0; flex-shrink: 0; flex-wrap: wrap;
    }
    .unit-pill {
      padding: 0.35rem 0.8rem; border-radius: 10px; cursor: pointer;
      font-size: 0.75rem; font-weight: 700; font-family: inherit;
      border: 1px solid var(--glass-border); background: var(--glass);
      color: var(--text-muted); transition: all 0.3s;
    }
    .unit-pill.active { color: white; border-color: transparent; }
    .unit-pill[data-u="1"].active { background: var(--gradient-1); }
    .unit-pill[data-u="2"].active { background: var(--gradient-2); }
    .unit-pill[data-u="3"].active { background: var(--gradient-3); }
    .unit-pill[data-u="4"].active { background: var(--gradient-4); }

    /* ===== Card Stage ===== */
    .stage {
      flex: 1; display: flex; flex-direction: column;
      justify-content: center; padding: 0.5rem 0;
      min-height: 0;
    }

    /* ===== Flashcard ===== */
    .fc-scene { perspective: 1000px; width: 100%; }
    .fc-card {
      position: relative; width: 100%; min-height: 260px;
      cursor: pointer; transition: transform 0.6s cubic-bezier(0.4,0,0.2,1);
      transform-style: preserve-3d;
    }
    .fc-card.flipped { transform: rotateY(180deg); }
    .fc-face {
      position: absolute; inset: 0; border-radius: 20px; padding: 2rem 1.5rem;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      backface-visibility: hidden; -webkit-backface-visibility: hidden;
      border: 1px solid var(--glass-border); box-shadow: var(--shadow-lg);
    }
    .fc-front { background: linear-gradient(145deg, var(--bg-card), var(--surface)); }
    .fc-back { background: linear-gradient(145deg, #1a1f3a, #252d55); transform: rotateY(180deg); }
    .fc-label {
      font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px;
      color: var(--accent-1); margin-bottom: 0.8rem; font-weight: 800;
    }
    .fc-text {
      font-size: 1.05rem; text-align: center; line-height: 1.8;
      font-weight: 500; word-break: keep-all;
    }
    .fc-back .fc-text { color: var(--green); }
    .fc-tap {
      position: absolute; bottom: 1rem;
      font-size: 0.65rem; color: var(--text-muted);
    }

    /* ===== Quiz Card (one at a time) ===== */
    .qcard {
      background: linear-gradient(145deg, var(--bg-card), var(--surface));
      border: 1px solid var(--glass-border); border-radius: 20px;
      padding: 1.5rem; box-shadow: var(--shadow-lg);
      animation: slideIn 0.35s ease-out;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(40px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .qcard-badge {
      display: inline-block; padding: 0.25rem 0.7rem; border-radius: 8px;
      font-size: 0.7rem; font-weight: 800; margin-bottom: 0.8rem;
    }
    .qcard-q {
      font-size: 1rem; font-weight: 600; line-height: 1.7;
      margin-bottom: 1.2rem; word-break: keep-all;
    }

    /* MC options */
    .mc-opts { display: flex; flex-direction: column; gap: 8px; }
    .mc-opt {
      padding: 0.75rem 1rem; border-radius: 12px;
      border: 1px solid var(--glass-border); background: var(--glass);
      cursor: pointer; font-size: 0.9rem; font-weight: 400;
      font-family: inherit; color: var(--text-secondary);
      transition: all 0.25s; text-align: left; line-height: 1.5;
    }
    .mc-opt:active:not(.locked) { transform: scale(0.97); }
    .mc-opt.correct {
      background: var(--green-bg); border-color: var(--green);
      color: var(--green); font-weight: 600;
    }
    .mc-opt.wrong {
      background: var(--red-bg); border-color: var(--red);
      color: var(--red); font-weight: 600;
    }
    .mc-opt.locked { cursor: default; opacity: 0.55; }
    .mc-opt.correct.locked { opacity: 1; }
    .mc-exp {
      margin-top: 0.8rem; padding: 0.8rem 1rem; border-radius: 12px;
      background: rgba(99,102,241,0.06); border: 1px solid rgba(99,102,241,0.15);
      font-size: 0.82rem; line-height: 1.6; color: var(--text-secondary);
      animation: fadeIn 0.3s;
    }

    /* Short answer input */
    .sa-inputs { display: flex; flex-direction: column; gap: 8px; margin-top: 0.3rem; }
    .sa-row { display: flex; gap: 8px; }
    .sa-input {
      flex: 1; padding: 0.75rem 1rem; border-radius: 12px;
      border: 1px solid var(--glass-border); background: var(--glass);
      color: var(--text-primary); font-size: 0.95rem;
      font-family: inherit; transition: all 0.3s; outline: none;
    }
    .sa-input:focus { border-color: var(--accent-1); box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }
    .sa-input.correct { border-color: var(--green); background: var(--green-bg); color: var(--green); }
    .sa-input.wrong { border-color: var(--red); background: var(--red-bg); color: var(--red); }
    .sa-submit {
      padding: 0.75rem 1.3rem; border-radius: 12px; cursor: pointer;
      font-size: 0.85rem; font-weight: 700; font-family: inherit;
      border: none; background: var(--gradient-1); color: white;
      transition: all 0.3s; white-space: nowrap;
    }
    .sa-submit:active { transform: scale(0.95); }
    .sa-result {
      margin-top: 0.7rem; padding: 0.7rem 1rem; border-radius: 12px;
      font-size: 0.85rem; line-height: 1.5; animation: fadeIn 0.3s;
    }
    .sa-result.ok { background: var(--green-bg); color: var(--green); }
    .sa-result.fail { background: var(--red-bg); color: var(--red); }

    /* ===== Bottom Bar ===== */
    .bottom-bar {
      flex-shrink: 0; padding: 0.8rem 0 1.2rem;
      display: flex; flex-direction: column; gap: 0.6rem; align-items: center;
    }
    .counter {
      font-size: 0.8rem; color: var(--text-muted); font-weight: 600;
    }
    .progress-track {
      width: 100%; height: 5px; background: var(--surface);
      border-radius: 100px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; border-radius: 100px; transition: width 0.4s ease;
      background: var(--gradient-1);
    }
    .nav-row {
      display: flex; gap: 10px; width: 100%;
    }
    .nav-btn {
      flex: 1; padding: 0.7rem; border-radius: 12px; cursor: pointer;
      font-size: 0.85rem; font-weight: 600; font-family: inherit;
      border: 1px solid var(--glass-border); background: var(--glass);
      color: var(--text-secondary); transition: all 0.2s;
      text-align: center;
    }
    .nav-btn:active { transform: scale(0.96); }
    .nav-btn.primary {
      background: var(--gradient-1); color: white;
      border-color: transparent; box-shadow: 0 4px 12px rgba(99,102,241,0.3);
    }

    /* ===== Score Overlay ===== */
    .score-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(10,14,26,0.92); backdrop-filter: blur(10px);
      display: flex; justify-content: center; align-items: center;
      animation: fadeIn 0.3s;
    }
    .score-overlay.hidden { display: none; }
    .score-box {
      text-align: center; padding: 2.5rem 2rem;
      background: linear-gradient(145deg, var(--bg-card), var(--surface));
      border: 1px solid var(--glass-border); border-radius: 24px;
      box-shadow: var(--shadow-lg); max-width: 320px; width: 90%;
    }
    .score-emoji { font-size: 3rem; margin-bottom: 0.5rem; }
    .score-num {
      font-size: 3rem; font-weight: 900;
      background: linear-gradient(135deg, var(--green), var(--blue));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .score-sub { color: var(--text-muted); font-size: 0.9rem; margin-top: 0.3rem; }
    .score-actions { display: flex; gap: 10px; margin-top: 1.5rem; justify-content: center; }
    .score-btn {
      padding: 0.65rem 1.5rem; border-radius: 12px; cursor: pointer;
      font-size: 0.85rem; font-weight: 700; font-family: inherit;
      border: 1px solid var(--glass-border); background: var(--glass);
      color: var(--text-secondary); transition: all 0.2s;
    }
    .score-btn:active { transform: scale(0.95); }
    .score-btn.primary { background: var(--gradient-1); color: white; border-color: transparent; }

    /* ===== Utilities ===== */
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .hidden { display: none !important; }

    /* ===== Mobile tweaks ===== */
    @media (max-height: 700px) {
      .header { padding: 0.8rem 0 0.5rem; }
      .header h1 { font-size: 1.3rem; }
      .fc-face { padding: 1.5rem 1.2rem; min-height: 220px; }
      .fc-card { min-height: 220px; }
      .qcard { padding: 1.2rem; }
      .qcard-q { font-size: 0.92rem; margin-bottom: 0.8rem; }
    }
    @media (min-width: 481px) {
      .header h1 { font-size: 1.8rem; }
      .fc-text { font-size: 1.15rem; }
      .qcard-q { font-size: 1.05rem; }
    }
  </style>
</head>
<body>

<div class="bg-orbs"><div class="orb"></div><div class="orb"></div></div>

<div class="app">

    <h1>📚 사회 시험 대비</h1>
  </header>

  <nav class="tab-nav" id="tabNav"></nav>
  <div class="unit-pills" id="unitPills"></div>

  <div class="stage" id="stage"></div>

  <div class="bottom-bar" id="bottomBar">
    <div class="counter" id="counter"></div>
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <div class="nav-row" id="navRow"></div>
  </div>
</div>

<div class="score-overlay hidden" id="scoreOverlay"></div>

const MC = {
  1:[
    {q:"다음 중 인권의 특성으로 옳지 않은 것은?",o:["천부적이다 (불가침)","양도할 수 없다","국가에 의해 부여된다","보편적이다"],a:2,e:"인권은 국가가 부여하는 것이 아니라 태어나면서부터 가지는 천부적 권리이다."},
    {q:"\"국가 권력으로부터의 자유\"를 의미하는 소극적 권리는?",o:["사회권","자유권","참정권","청구권"],a:1,e:"자유권은 국가 권력의 간섭으로부터 자유를 보장받는 소극적 권리이다."},
    {q:"기본권 제한 사유가 아닌 것은?",o:["국가안전 보장","질서유지","경제 성장","공공복리"],a:2,e:"기본권 제한 사유는 국가안전 보장, 질서유지, 공공복리 3가지이다."},
    {q:"노동3권에 해당하지 않는 것은?",o:["단결권","단체교섭권","단체행동권","단체소송권"],a:3,e:"노동3권은 단결권, 단체교섭권, 단체행동권이다."},
    {q:"교육·근로·인간다운 생활을 요구하는 적극적 권리는?",o:["자유권","참정권","사회권","평등권"],a:2,e:"사회권은 적극적 권리로 교육, 근로, 인간다운 생활을 국가에 요구할 수 있다."},
  ],
  2:[
    {q:"국회의원의 임기는?",o:["3년","4년","5년","6년"],a:1,e:"국회의원 임기는 4년이다."},
    {q:"대통령의 임기와 연임 여부는?",o:["4년, 1회 연임 가능","5년, 연임 불가","5년, 1회 연임 가능","6년, 연임 불가"],a:1,e:"대통령 임기 5년, 단임제(연임 불가)이다."},
    {q:"헌법재판소의 권한이 아닌 것은?",o:["위헌법률심판","탄핵심판","국정감사","정당해산심판"],a:2,e:"국정감사는 국회의 권한이다."},
    {q:"대법원이 담당하는 심급은?",o:["1심","2심","3심 (최종심)","특별심"],a:2,e:"대법원은 최종심(3심)을 담당한다."},
    {q:"국회가 행정부를 견제하는 수단은?",o:["법률안 거부권","위헌 법률 심사 제청","국정감사 및 탄핵소추","명령·규칙 심사"],a:2,e:"국회는 국정감사와 탄핵소추로 행정부를 견제한다."},
  ],
  3:[
    {q:"경제활동 3요소가 올바른 것은?",o:["생산, 교환, 저축","생산, 분배, 소비","소비, 투자, 저축","생산, 소비, 투자"],a:1,e:"경제활동은 재화와 서비스의 생산, 분배, 소비이다."},
    {q:"시장경제에서 자원 배분의 핵심은?",o:["정부의 명령","가격","전통과 관습","국회의 법률"],a:1,e:"시장경제에서는 가격에 의해 자원이 배분된다."},
    {q:"합리적 선택을 위해 비교하는 두 가지는?",o:["수요와 공급","비용과 편익","소득과 지출","저축과 투자"],a:1,e:"비용과 편익을 비교하여 편익이 큰 쪽을 선택한다."},
    {q:"경제주체와 역할이 올바른 것은?",o:["가계 — 생산","기업 — 소비","정부 — 공공재 공급","가계 — 공공재 공급"],a:2,e:"가계=소비, 기업=생산, 정부=공공재 공급이다."},
    {q:"선택으로 포기한 것의 가치를?",o:["매몰 비용","기회비용","한계비용","고정비용"],a:1,e:"기회비용은 포기한 대안의 가치이다."},
  ],
  4:[
    {q:"가격이 오르면 수요량은?",o:["증가한다","감소한다","변하지 않는다","두 배가 된다"],a:1,e:"수요 법칙: 가격↑ → 수요량↓"},
    {q:"초과 수요가 발생하면 가격은?",o:["하락한다","상승한다","유지된다","정부가 결정"],a:1,e:"초과 수요 → 가격 상승"},
    {q:"균형 가격이란?",o:["정부가 정한 가격","가장 낮은 가격","수요량·공급량 일치 가격","생산비용 = 가격"],a:2,e:"수요와 공급이 만나는 점의 가격이다."},
    {q:"수요 변동 요인이 아닌 것은?",o:["소비자의 소득","소비자의 기호","원자재 가격","대체재의 가격"],a:2,e:"원자재 가격은 공급 변동 요인이다."},
    {q:"공급 곡선의 모양은?",o:["우하향 (↘)","우상향 (↗)","수평선 (→)","수직선 (↑)"],a:1,e:"가격↑ → 공급량↑ → 우상향"},
  ],
};

const SA = {
  1:[
    {q:"헌법에 기록된 인권을 무엇이라 하는가?",ans:[["기본권"]]},
    {q:"기본권 제한 시 _____(으)로써 해야 하며,\n_____적 내용은 침해 불가.",ans:[["법률"],["본질"]]},
    {q:"단결권, 단체교섭권, 단체행동권을 통틀어?",ans:[["노동3권","노동 3권","노동삼권"]]},
    {q:"노동권 침해 시 가장 먼저 구제 신청하는 기관?",ans:[["지방노동위원회"]]},
    {q:"국가에 적극적으로 인간다운 생활을 요구하는 권리?",ans:[["사회권"]]},
  ],
  2:[
    {q:"국회의원 임기는 ___년,\n대통령 임기는 ___년이다.",ans:[["4"],["5"]]},
    {q:"대법원은 ___심(최종심)을 담당한다.",ans:[["3"]]},
    {q:"헌법재판소는 ___인으로 구성된다.",ans:[["9"]]},
    {q:"헌법재판소 5가지 심판 중 하나를 쓰시오.",ans:[["위헌법률심판","헌법소원심판","정당해산심판","권한쟁의심판","탄핵심판"]]},
    {q:"입법·행정·사법으로 나누어 견제하는 원리?",ans:[["삼권분립"]]},
  ],
  3:[
    {q:"경제활동의 3요소 중 하나를 쓰시오.",ans:[["생산","분배","소비"]]},
    {q:"시장경제에서 자원 배분의 핵심?",ans:[["가격"]]},
    {q:"선택으로 포기한 것의 가치를?",ans:[["기회비용"]]},
    {q:"3가지 경제주체 중 하나를 쓰시오.",ans:[["가계","기업","정부"]]},
    {q:"혁신으로 새 가치를 창출하는 정신?",ans:[["기업가 정신","기업가정신"]]},
  ],
  4:[
    {q:"가격↑ → 수요량은 _____,\n공급량은 _____.",ans:[["감소"],["증가"]]},
    {q:"수요량과 공급량이 일치하는 가격?",ans:[["균형 가격","균형가격"]]},
    {q:"수요 곡선은 _____ 형태이다.",ans:[["우하향"]]},
    {q:"초과 수요 → 가격 _____,\n초과 공급 → 가격 _____.",ans:[["상승"],["하락"]]},
    {q:"공급 곡선은 _____ 형태이다.",ans:[["우상향"]]},
  ],
};

const UNIT_NAMES = ["","1단원","2단원","3단원","4단원"];
const BADGE_COLORS = ["","rgba(129,140,248,0.15);color:#818cf8","rgba(248,113,113,0.15);color:#f87171","rgba(96,165,250,0.15);color:#60a5fa","rgba(52,211,153,0.15);color:#34d399"];

// ========== STATE ==========
let mode = "fc"; // fc | mc | sa
let unit = 1;
let idx = 0;
let fcFlipped = false;
let mcLocked = false;
let saLocked = false;
let scores = {}; // key: "mc-1-2" => true/false

function getData() {
  if (mode === "fc") return FC[unit] || [];
  if (mode === "mc") return MC[unit] || [];
  return SA[unit] || [];
}

// ========== RENDER ==========
function renderTabs() {
  const tabs = [
    {id:"fc", label:"🃏 플래시카드"},
    {id:"mc", label:"📋 4지선다"},
    {id:"sa", label:"✏️ 단답형"},
  ];
  document.getElementById("tabNav").innerHTML = tabs.map(t =>
    `<button class="tab-btn${t.id===mode?" active":""}" onclick="switchMode('${t.id}')">${t.label}</button>`
  ).join("");
}

function renderUnits() {
  document.getElementById("unitPills").innerHTML = [1,2,3,4].map(u =>
    `<button class="unit-pill${u===unit?" active":""}" data-u="${u}" onclick="switchUnit(${u})">${UNIT_NAMES[u]}</button>`
  ).join("");
}

function renderBottom() {
  const data = getData();
  const total = data.length;
  document.getElementById("counter").textContent = `${idx+1} / ${total}`;
  document.getElementById("progressFill").style.width = `${((idx+1)/total)*100}%`;

  let btns = `<button class="nav-btn" onclick="goPrev()">← 이전</button>`;
  if (mode === "fc") btns += `<button class="nav-btn" onclick="doShuffle()">🔀 섞기</button>`;
  btns += `<button class="nav-btn primary" onclick="goNext()">다음 →</button>`;
  document.getElementById("navRow").innerHTML = btns;
}

function renderStage() {
  const stage = document.getElementById("stage");
  if (mode === "fc") renderFC(stage);
  else if (mode === "mc") renderMC(stage);
  else renderSA(stage);
  renderBottom();
}

// ----- Flashcard -----
function renderFC(stage) {
  const card = FC[unit][idx];
  fcFlipped = false;
  stage.innerHTML = `
    <div class="fc-scene">
      <div class="fc-card" id="fcCard" onclick="flipFC()">
        <div class="fc-face fc-front">
          <div class="fc-label">질문</div>
          <div class="fc-text">${esc(card.q)}</div>
          <div class="fc-tap">탭하여 뒤집기</div>
        </div>
        <div class="fc-face fc-back">
          <div class="fc-label">정답</div>
          <div class="fc-text">${esc(card.a)}</div>
          <div class="fc-tap">탭하여 돌아가기</div>
        </div>
      </div>
    </div>`;
}

function flipFC() {
  fcFlipped = !fcFlipped;
  document.getElementById("fcCard").classList.toggle("flipped");
}

// ----- Multiple Choice -----
function renderMC(stage) {
  const item = MC[unit][idx];
  mcLocked = false;
  const key = `mc-${unit}-${idx}`;
  const badge = BADGE_COLORS[unit];
  stage.innerHTML = `
    <div class="qcard" id="qcard">
      <div class="qcard-badge" style="background:${badge}">Q${idx+1}</div>
      <div class="qcard-q">${esc(item.q)}</div>
      <div class="mc-opts" id="mcOpts">
        ${item.o.map((o,i) => `<button class="mc-opt" data-i="${i}" onclick="pickMC(${i})">${["①","②","③","④"][i]} ${esc(o)}</button>`).join("")}
      </div>
      <div id="mcExp"></div>
    </div>`;
}

function pickMC(i) {
  if (mcLocked) return;
  mcLocked = true;
  const item = MC[unit][idx];
  const key = `mc-${unit}-${idx}`;
  const opts = document.querySelectorAll(".mc-opt");
  opts.forEach((o, oi) => {
    o.classList.add("locked");
    if (oi === item.a) o.classList.add("correct");
  });
  if (i !== item.a) opts[i].classList.add("wrong");
  scores[key] = (i === item.a);
  document.getElementById("mcExp").innerHTML = `<div class="mc-exp">💡 ${esc(item.e)}</div>`;
  // Auto-advance after delay
  setTimeout(() => { if (idx < MC[unit].length - 1) goNext(); else showScore("mc"); }, 1800);
}

// ----- Short Answer -----
function renderSA(stage) {
  const item = SA[unit][idx];
  saLocked = false;
  const badge = BADGE_COLORS[unit];
  const inputs = item.ans.map((_, j) =>
    `<input class="sa-input" id="saIn${j}" placeholder="답 입력" onkeydown="if(event.key==='Enter')checkSA()">`
  ).join("");
  stage.innerHTML = `
    <div class="qcard">
      <div class="qcard-badge" style="background:${badge}">S${idx+1}</div>
      <div class="qcard-q">${esc(item.q)}</div>
      <div class="sa-inputs">
        <div class="sa-row">${inputs}<button class="sa-submit" onclick="checkSA()">확인</button></div>
      </div>
      <div id="saResult"></div>
    </div>`;
  // Auto-focus first input
  setTimeout(() => { const el = document.getElementById("saIn0"); if (el) el.focus(); }, 100);
}

function checkSA() {
  if (saLocked) return;
  saLocked = true;
  const item = SA[unit][idx];
  const key = `sa-${unit}-${idx}`;
  let allOk = true;
  for (let j = 0; j < item.ans.length; j++) {
    const inp = document.getElementById(`saIn${j}`);
    const val = inp.value.trim();
    const ok = item.ans[j].some(a => val === a);
    inp.disabled = true;
    inp.classList.add(ok ? "correct" : "wrong");
    if (!ok) allOk = false;
  }
  scores[key] = allOk;
  const rd = document.getElementById("saResult");
  if (allOk) {
    rd.innerHTML = `<div class="sa-result ok">✅ 정답!</div>`;
  } else {
    rd.innerHTML = `<div class="sa-result fail">❌ 정답: ${item.ans.map(a=>a[0]).join(" / ")}</div>`;
  }
  setTimeout(() => { if (idx < SA[unit].length - 1) goNext(); else showScore("sa"); }, 1800);
}

// ========== NAVIGATION ==========
function switchMode(m) { mode = m; idx = 0; renderTabs(); renderStage(); }
function switchUnit(u) { unit = u; idx = 0; renderUnits(); renderStage(); }
function goPrev() { const d = getData(); idx = (idx - 1 + d.length) % d.length; renderStage(); }
function goNext() { const d = getData(); idx = (idx + 1) % d.length; renderStage(); }
function doShuffle() {
  const arr = FC[unit];
  for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [arr[i],arr[j]] = [arr[j],arr[i]]; }
  idx = 0; renderStage();
}

// ========== SCORE ==========
function showScore(type) {
  const data = type === "mc" ? MC[unit] : SA[unit];
  let correct = 0;
  data.forEach((_, i) => { if (scores[`${type}-${unit}-${i}`]) correct++; });
  const pct = Math.round((correct / data.length) * 100);
  const emoji = pct === 100 ? "🎉" : pct >= 60 ? "👍" : "💪";
  const ov = document.getElementById("scoreOverlay");
  ov.classList.remove("hidden");
  ov.innerHTML = `
    <div class="score-box">
      <div class="score-emoji">${emoji}</div>
      <div class="score-num">${correct} / ${data.length}</div>
      <div class="score-sub">${pct}% 정답률</div>
      <div class="score-actions">
        <button class="score-btn" onclick="closeScore()">닫기</button>
        <button class="score-btn primary" onclick="retryQuiz('${type}')">🔄 다시 풀기</button>
      </div>
    </div>`;
}

function closeScore() { document.getElementById("scoreOverlay").classList.add("hidden"); }
function retryQuiz(type) {
  const data = type === "mc" ? MC[unit] : SA[unit];
  data.forEach((_, i) => { delete scores[`${type}-${unit}-${i}`]; });
  idx = 0;
  closeScore();
  renderStage();
}

// ========== KEYBOARD ==========
document.addEventListener("keydown", e => {
  if (e.key === "ArrowRight") goNext();
  else if (e.key === "ArrowLeft") goPrev();
  else if ((e.key === " " || e.key === "Enter") && mode === "fc") { e.preventDefault(); flipFC(); }
});

// ========== SWIPE ==========
let tx = 0;
document.addEventListener("touchstart", e => { tx = e.touches[0].clientX; }, {passive:true});
document.addEventListener("touchend", e => {
  const dx = e.changedTouches[0].clientX - tx;
  if (Math.abs(dx) > 60) { dx > 0 ? goPrev() : goNext(); }
}, {passive:true});

// ========== UTIL ==========
function esc(s) { return s.replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>"); }

// ========== INIT ==========
renderTabs();
renderUnits();
renderStage();
</script>
</body>
</html>
